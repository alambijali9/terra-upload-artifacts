name: upload-artifacts
on: 
  workflow_dispatch: 
  
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-22.04
    steps: 
    - name: Checkout code
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - uses: azure/login@v3
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}  
        
    - name: Terraform installer
      uses: autero1/action-terraform@v3.0.1
      
    - name: Azure CLI script
      uses: azure/cli@v2
      with:
        azcliversion: latest
        inlineScript: |
          terraform init
          terraform plan
          
    - name: Upload Terraform Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-${{ github.run_number }}
        path: tfplan

          

              

                  

        

      


